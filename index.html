
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSPEWA Portal</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f8ff;
color:#003366;
}

/* NAV */
header{
background:linear-gradient(90deg,#0057b7,#007bff);
padding:15px;
position:sticky;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO */
.hero{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,87,183,0.8),rgba(255,255,255,0.9)),
url('https://images.unsplash.com/photo-1529070538774-1843cb3265df') center/cover;
color:white;
padding:20px;
}

.hero h2{
font-size:40px;
}

/* FORM */
section{
padding:50px 20px;
}

.form-box{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
}

textarea{
height:80px;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.blue{background:#1976d2;color:white;}
.green{background:#2e7d32;color:white;}
.dark{background:#0d47a1;color:white;}

/* POPUP */
#popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
width:300px;
}
</style>
</head>

<body>

<header>
<nav>
<h2>APSPEWA</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#register">Register</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
<div>
<h2>Welcome to APSPEWA Portal</h2>
<p>Membership registration and digital ID system</p>
</div>
</section>

<!-- REGISTER -->
<section id="register">
<div class="form-box">

<h2 style="text-align:center;color:#0d47a1;">Membership Registration</h2>

<form id="memberForm">

<div class="grid">

<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Father Name" required>

<input type="email" placeholder="Email ID" required>
<input type="tel" placeholder="Mobile Number" required>

<input type="text" placeholder="Mandal" required>
<input type="text" placeholder="District" required>

<input type="text" placeholder="State" required>
<input type="text" placeholder="Pincode" required>

</div>

<textarea placeholder="Full Address"></textarea>

<input type="file" accept="image/*">

<div>
<button type="button" class="blue" onclick="generateID()">Generate ID</button>
<button type="submit" class="dark">Submit</button>
<button type="button" class="green" onclick="downloadPDF()">Download PDF</button>
</div>

<p id="idResult" style="color:green;font-weight:bold;margin-top:10px;"></p>

</form>
</div>
</section>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h2 style="color:green;">✅ Registration Successful</h2>
<p id="popupID"></p>
<button onclick="closePopup()" class="dark">OK</button>
</div>
</div>

<script>
let generatedID = "";
let photoData = "";

/* PHOTO */
document.querySelector('input[type="file"]').addEventListener("change", function(e){
const file = e.target.files[0];
const reader = new FileReader();
reader.onload = () => photoData = reader.result;
reader.readAsDataURL(file);
});

/* GENERATE ID */
function generateID(){
generatedID = "APSPEWA-" + Math.floor(100000 + Math.random()*900000);
document.getElementById("idResult").innerText = "ID: " + generatedID;
}

/* SUBMIT */
document.getElementById("memberForm").addEventListener("submit", function(e){
e.preventDefault();

if(!generatedID){
generatedID = "APSPEWA-" + Math.floor(Math.random()*999999);
}

document.getElementById("popupID").innerText = "ID: " + generatedID;
document.getElementById("popup").style.display = "flex";

this.reset();
});

/* CLOSE POPUP */
function closePopup(){
document.getElementById("popup").style.display = "none";
}

/* PDF */
function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const inputs = document.querySelectorAll("#memberForm input");

doc.setFontSize(16);
doc.text("APSPEWA ID CARD", 20, 20);

doc.setFontSize(12);
doc.text("ID: " + generatedID, 20, 40);
doc.text("Name: " + inputs[0].value, 20, 50);
doc.text("Father: " + inputs[1].value, 20, 60);
doc.text("Email: " + inputs[2].value, 20, 70);
doc.text("Mobile: " + inputs[3].value, 20, 80);

if(photoData){
doc.addImage(photoData, "JPEG", 140, 30, 50, 50);
}

doc.save(generatedID + ".pdf");
}
</script>
<section id="gallery" style="padding:50px 20px;background:#f4f8ff;">
  <h2 style="text-align:center;color:#0057b7;margin-bottom:20px;">
    Gallery
  </h2>

  <div style="
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    max-width:1000px;
    margin:auto;
  ">

    <img src="images/1.jpg">
    <img src="images/2.jpg">
    <img src="images/3.jpg">
    <img src="images/4.jpg">

  </div>
</section>
</body>
</html>
