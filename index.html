<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSPEWA Portal</title>

<!-- jsPDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body{
    background:#f4f8ff;
    color:#003366;
}

/* NAV */
header{
    background: linear-gradient(90deg,#0057b7,#007bff);
    padding:15px;
    position:sticky;
    top:0;
}

nav{
    display:flex;
    justify-content:space-between;
    color:white;
}

nav ul{
    display:flex;
    gap:20px;
    list-style:none;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* HERO */
.hero{
    height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:linear-gradient(rgba(0,87,183,0.8),rgba(255,255,255,0.9)),
    url('https://images.unsplash.com/photo-1529070538774-1843cb3265df') center/cover;
    color:white;
    padding:20px;
}

.hero h2{font-size:40px;}

/* SECTION */
section{padding:50px 20px;}

.section-title{
    text-align:center;
    font-size:28px;
    color:#0057b7;
    margin-bottom:20px;
}

/* FORM */
.form-box{
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#0057b7;
    color:white;
    border:none;
    margin-top:10px;
    cursor:pointer;
}

/* ID CARD */
.id-card{
    display:none;
    margin-top:20px;
    padding:15px;
    border-left:5px solid #0057b7;
    background:#e6f0ff;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#0057b7;
    color:white;
}
</style>
</head>

<body>

<header>
<nav>
<h2>APSPEWA</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#register">Register</a></li>
<li><a href="#gallery">Gallery</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
<div>
<h2>Welcome to APSPEWA Portal</h2>
<p>Community welfare & digital membership system with ID card generation</p>
</div>
</section>

<!-- REGISTER -->
<section id="register">
<h2 class="section-title">Member Registration</h2>

<div class="form-box">
<form id="regForm">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="phone" placeholder="Phone" required>
<input type="text" id="mandal" placeholder="Mandal" required>
<input type="text" id="state" placeholder="State" required>

<button type="button" onclick="generateID()">Generate ID</button>
<button type="button" onclick="downloadPDF()">Download ID PDF</button>

</form>

<div id="idCard" class="id-card"></div>
</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2 class="section-title">Gallery</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;">
<img src="https://source.unsplash.com/400x300/?community" style="width:100%">
<img src="https://source.unsplash.com/400x300/?meeting" style="width:100%">
<img src="https://source.unsplash.com/400x300/?education" style="width:100%">
<img src="https://source.unsplash.com/400x300/?india" style="width:100%">
</div>
</section>

<footer>
© 2026 APSPEWA | All Rights Reserved
</footer>

<script>
let generatedID = "";

function generateID(){
    generatedID = "APSPEWA-" + Math.floor(Math.random()*1000000);

    document.getElementById("idCard").style.display = "block";
    document.getElementById("idCard").innerHTML = `
        <h3>Member ID Card</h3>
        <p><b>ID:</b> ${generatedID}</p>
        <p><b>Name:</b> ${document.getElementById("name").value}</p>
        <p><b>Mandal:</b> ${document.getElementById("mandal").value}</p>
        <p>Status: ACTIVE MEMBER</p>
    `;
}

/* ===== PDF DOWNLOAD ===== */
function downloadPDF(){
    if(!generatedID){
        alert("Please generate ID first!");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("APSPEWA MEMBER ID CARD", 20, 20);

    doc.setFontSize(12);
    doc.text("ID: " + generatedID, 20, 40);
    doc.text("Name: " + document.getElementById("name").value, 20, 50);
    doc.text("Email: " + document.getElementById("email").value, 20, 60);
    doc.text("Phone: " + document.getElementById("phone").value, 20, 70);
    doc.text("Mandal: " + document.getElementById("mandal").value, 20, 80);
    doc.text("State: " + document.getElementById("state").value, 20, 90);

    doc.text("Status: ACTIVE MEMBER", 20, 110);

    doc.save(generatedID + "_APSPEWA_ID.pdf");
}
</script>

</body>
</html>
