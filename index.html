<script>
function submitForm() {
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let address = document.getElementById("address").value.trim();

  if (name === "" || email === "" || address === "") {
    alert("Please fill all fields");
    return false;
  }

  // Generate Member ID
  let memberId = "APS" + Date.now().toString().slice(-6);

  // Save to localStorage
  let users = JSON.parse(localStorage.getItem("apspewaUsers") || "[]");
  users.push({ name, email, address, memberId });
  localStorage.setItem("apspewaUsers", JSON.stringify(users));

  // Fill ID Card
  document.getElementById("cardName").innerText = name;
  document.getElementById("cardEmail").innerText = email;
  document.getElementById("cardAddress").innerText = address;
  document.getElementById("memberId").innerText = memberId;

  // Show message
  document.getElementById("msg").innerText =
    "Registration successful! ID Card generated.";

  return false;
}
</script>
