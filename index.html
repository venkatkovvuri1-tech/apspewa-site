
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSPEWA Official Portal</title>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial;
}

body{
  background:#eef3fb;
  color:#1b1b1b;
}

/* HEADER */
header{
  background:#0d47a1;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* HERO */
.hero{
  background:linear-gradient(rgba(13,71,161,0.85), rgba(25,118,210,0.85)),
  url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
  background-size:cover;
  background-position:center;
  color:white;
  text-align:center;
  padding:90px 20px;
}

.hero h1{
  font-size:40px;
}

.hero p{
  margin-top:10px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}

.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#ffca28;
  color:black;
  text-decoration:none;
  border-radius:5px;
  font-weight:bold;
}

/* SECTIONS */
.section{
  padding:50px 20px;
  text-align:center;
}

.section h2{
  color:#0d47a1;
  margin-bottom:20px;
}

/* FORM */
.form{
  max-width:400px;
  margin:auto;
}

.form input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#0d47a1;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:10px;
}

/* ID CARD */
<div class="id-card">

  <div class="id-header">
    APSPEWA OFFICIAL ID
  </div>

  <img id="preview" class="id-photo"
       src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

  <div class="id-details">
    <p><b>Name:</b> <span id="cardName"></span></p>
    <p><b>Email:</b> <span id="cardEmail"></span></p>
    <p><b>Address:</b> <span id="cardAddress"></span></p>
  </div>

  <div class="id-number">
    ID: <span id="memberId"></span>
  </div>

  <div class="qr-box"></div>

</div>
/* FOOTER */
footer{
  background:#0d47a1;
  color:white;
  text-align:center;
  padding:15px;
  margin-top:30px;
}
</style>
</head>

<body>

<header>
APSPEWA OFFICIAL PORTAL
</header>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to APSPEWA</h1>
  <p>Employee Welfare • Development • Community Support Platform</p>
  <a href="#register" class="btn">Apply Now</a>
</section>

<!-- REGISTER -->
<section class="section" id="register">

<h2>Member Registration</h2>

<form class="form" onsubmit="return false;">

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Address">

<!-- PHOTO -->
<input type="file" id="photo" accept="image/*">

<button type="button" onclick="generateID()">
Generate ID
</button>

<button type="button" onclick="downloadPDF()">
Download ID (PDF)
</button>

</form>

<!-- ID CARD -->
<div class="card">

<img id="preview" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h3 id="cardName">Name</h3>
<p id="cardEmail">Email</p>
<p id="cardAddress">Address</p>
<p><b>ID:</b> <span id="memberId"></span></p>

</div>

<p id="msg"></p>

</section>

<footer>
© 2026 APSPEWA Official Portal
</footer>

<script>

let imageData = null;

function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF({
  orientation: "landscape",
  unit: "mm",
  format: [85.6, 54]   // REAL ID CARD SIZE (CR80)
});

let name=document.getElementById("cardName").innerText;
let email=document.getElementById("cardEmail").innerText;
let address=document.getElementById("cardAddress").innerText;
let id=document.getElementById("memberId").innerText;

doc.setFillColor(13,71,161);
doc.rect(0,0,100,60,"F");

doc.setTextColor(255,255,255);
doc.setFontSize(10);
doc.text("APSPEWA OFFICIAL ID",5,8);

doc.setFontSize(9);
doc.text("Name: "+name,5,20);
doc.text("Email: "+email,5,28);
doc.text("ID: "+id,5,36);

doc.save("APSPEWA_PVC_ID_CARD.pdf");
}

let id="APS"+Math.floor(100000+Math.random()*900000);

document.getElementById("cardName").innerText=name;
document.getElementById("cardEmail").innerText=email;
document.getElementById("cardAddress").innerText=address;
document.getElementById("memberId").innerText=id;

// PHOTO
let file=document.getElementById("photo").files[0];

if(file){
let reader=new FileReader();
reader.onload=function(e){
imageData=e.target.result;
document.getElementById("preview").src=imageData;
}
reader.readAsDataURL(file);
}

document.getElementById("msg").innerText="ID Generated Successfully!";
}

function downloadPDF(){

const { jsPDF } = window.jspdf;
const doc=new jsPDF();

let name=document.getElementById("cardName").innerText;
let email=document.getElementById("cardEmail").innerText;
let address=document.getElementById("cardAddress").innerText;
let id=document.getElementById("memberId").innerText;

doc.setFontSize(16);
doc.text("APSPEWA OFFICIAL ID CARD",20,20);

doc.setFontSize(12);
doc.text("Name: "+name,20,40);
doc.text("Email: "+email,20,50);
doc.text("Address: "+address,20,60);
doc.text("ID: "+id,20,70);

// PHOTO
if(imageData){
doc.addImage(imageData,"JPEG",140,30,50,50);
}

doc.save("APSPEWA_ID_CARD.pdf");
}

</script>

</body>
</html>
