
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APSPEWA Membership</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f9ff;
}

header{
  background:#0d47a1;
  color:white;
  padding:20px;
  text-align:center;
}

#register{
  padding:60px 20px;
}

.container{
  max-width:900px;
  margin:auto;
}

form{
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  border-top:6px solid #1976d2;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input, textarea{
  padding:12px;
  border:1px solid #ccc;
  border-radius:10px;
  width:100%;
}

textarea{
  margin-top:15px;
  height:80px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.blue{background:#1976d2;color:#fff;}
.dark{background:#0d47a1;color:#fff;}
.green{background:#2e7d32;color:#fff;}

.buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

</style>
</head>

<body>

<header>
  <h2>APSPEWA Membership Portal</h2>
</header>

<section id="register">
<div class="container">

<h2 style="text-align:center;color:#0d47a1;">Membership Registration</h2>

<form id="memberForm">

<div class="grid">

<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Father Name" required>

<input type="email" placeholder="Email ID" required>
<input type="tel" placeholder="Mobile Number" required>

<input type="text" placeholder="Mandal" required>
<input type="text" placeholder="District" required>

<input type="text" placeholder="State" required>
<input type="text" placeholder="Pincode" required>

</div>

<textarea placeholder="Full Address"></textarea>

<div class="buttons">

<input type="file" id="photoInput" accept="image/*">

<button type="button" class="btn blue" onclick="generateID()">Generate ID</button>

<button type="submit" class="btn dark">Submit</button>

<button type="button" class="btn green" onclick="downloadPDF()">Download PDF</button>

</div>

<p id="idResult" style="color:green;font-weight:bold;"></p>

</form>
</div>
</section>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2 style="color:green;">✅ Success</h2>
    <p>Registration Completed</p>
    <p id="popupID"></p>
    <button onclick="closePopup()" class="btn dark">OK</button>
  </div>
</div>

<script>
let userPhoto = "";
let currentID = "";

document.getElementById("photoInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(event){
    userPhoto = event.target.result;
  }
  reader.readAsDataURL(file);
});

function generateID(){
  currentID = "APSPEWA-" + Math.floor(100000 + Math.random()*900000);
  document.getElementById("idResult").innerText = "Member ID: " + currentID;
}

document.getElementById("memberForm").addEventListener("submit", function(e){
  e.preventDefault();

  if(!currentID){
    currentID = "APSPEWA-" + Math.floor(100000 + Math.random()*900000);
  }

  document.getElementById("popupID").innerText = "ID: " + currentID;

  document.getElementById("popup").style.display = "flex";

  this.reset();
});

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const form = document.getElementById("memberForm");
  const inputs = form.querySelectorAll("input");

  doc.text("APSPEWA MEMBER ID CARD", 20, 20);
  doc.text("Member ID: " + currentID, 20, 40);

  doc.text("Name: " + inputs[0].value, 20, 50);
  doc.text("Father: " + inputs[1].value, 20, 60);
  doc.text("Email: " + inputs[2].value, 20, 70);
  doc.text("Mobile: " + inputs[3].value, 20, 80);
  doc.text("Mandal: " + inputs[4].value, 20, 90);
  doc.text("District: " + inputs[5].value, 20, 100);

  if(userPhoto){
    doc.addImage(userPhoto,"JPEG",140,30,50,50);
  }

  doc.save(currentID + ".pdf");
}

</script>

</body>
</html>
